<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña | Proyecto Colegio</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="../css/estilos_proyectocolegio.css">

    <style>
        /* Adaptamos el renderizado de Django para el campo de Email */
        #django-form p {
            position: relative;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
        }

        #django-form label {
            color: #1C2E4A;
            font-weight: 700;
            border-bottom: 3px solid #FFC0CB;
            display: inline-block;
            padding-bottom: 5px;
            margin-bottom: 8px;
            width: fit-content;
        }

        #django-form input {
            background-color: #fcfcfc;
            border: 2px solid #eee;
            border-radius: 15px;
            padding: 15px 20px;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }

        #django-form input:focus {
            background-color: #fff;
            border-color: #FFC0CB;
            box-shadow: 10px 10px 20px rgba(255, 192, 203, 0.2), -5px -5px 15px rgba(255, 255, 255, 0.8);
            transform: translateY(-2px);
            outline: none;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="main-content-glass d-flex align-items-center justify-content-center" style="min-height: 100vh; width: 100vw;">

        <a href="{% url 'login:login' %}" class="btn-back-floating position-fixed top-0 start-0 m-4 text-decoration-none">
            <i class="fas fa-arrow-left me-2"></i> Volver al Login
        </a>

        <div class="container d-flex justify-content-center">
            <div class="col-md-6 col-lg-5">

                <div class="card-form card-custom">
                    <div class="card-header-custom">
                        <i class="fas fa-envelope-open-text fa-3x text-white mb-3"></i>
                        <h3>Restablecer Clave</h3>
                        <p class="text-white-50 m-0">Enviaremos un enlace de recuperación a tu correo electrónico.</p>
                    </div>

                    <div class="card-body p-4 p-md-5">

                        <form id="django-form" method="POST">
                            {% csrf_token %}

                            {{ form.as_p }}

                            {% if form.errors %}
                                <div class="error-box active mb-3">
                                    {% for field in form %}
                                        {% for error in field.errors %}
                                            <div class="error-item">
                                                <i class="fas fa-exclamation-circle me-2"></i> {{ error }}
                                            </div>
                                        {% endfor %}
                                    {% endfor %}
                                </div>
                            {% endif %}

                            <div class="d-grid mt-4">
                                <button type="submit" class="btn-save btn-lg">
                                    Enviar Correo <i class="fas fa-paper-plane ms-2"></i>
                                </button>
                            </div>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
