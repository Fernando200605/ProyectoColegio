<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña | Proyecto Colegio</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="../css/estilos_proyectocolegio.css">

    <style>
        body {
    background: linear-gradient(135deg, #1C2E4A, #0f172a);
    font-family: 'Segoe UI', sans-serif;
}

/* Contenedor principal tipo glass */
.main-content-glass {
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.05);
}

/* Tarjeta */
.card-custom {
    border-radius: 20px;
    overflow: hidden;
    border: none;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
    background: #ffffff;
}

/* Header */
.card-header-custom {
    background: linear-gradient(135deg, #1C2E4A, #2c3e66);
    padding: 30px;
    text-align: center;
    color: white;
}

/* Inputs */
#django-form input {
    background-color: #f9fafb;
    border: 2px solid #e5e7eb;
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 15px;
    transition: 0.3s;
}

#django-form input:focus {
    border-color: #4f46e5;
    box-shadow: 0px 0px 0px 3px rgba(79, 70, 229, 0.2);
    outline: none;
}

/* Labels */
#django-form label {
    font-weight: 600;
    color: #1C2E4A;
    margin-bottom: 6px;
}

/* Botón principal */
.btn-save {
    background: linear-gradient(135deg, #4f46e5, #6366f1);
    color: white;
    border-radius: 12px;
    padding: 12px;
    border: none;
    font-weight: 600;
    transition: 0.3s;
}

.btn-save:hover {
    transform: translateY(-2px);
    box-shadow: 0px 10px 20px rgba(79, 70, 229, 0.3);
}

/* Botón volver */
.btn-back-floating {
    background: white;
    color: #1C2E4A;
    padding: 10px 18px;
    border-radius: 50px;
    font-weight: 600;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.btn-back-floating:hover {
    background: #f1f5f9;
}

/* Errores */
.error-box {
    background: #fee2e2;
    border: 1px solid #f87171;
    border-radius: 10px;
    padding: 10px;
}

.error-item {
    color: #b91c1c;
    font-size: 14px;
}
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="main-content-glass d-flex align-items-center justify-content-center" style="min-height: 100vh; width: 100vw;">

        <a href="{% url 'login:login' %}" class="btn-back-floating position-fixed top-0 start-0 m-4 text-decoration-none">
            <i class="fas fa-arrow-left me-2"></i> Volver al Login
        </a>

        <div class="container d-flex justify-content-center">
            <div class="col-md-6 col-lg-5">

                <div class="card-form card-custom">
                    <div class="card-header-custom">
                        <i class="fas fa-envelope-open-text fa-3x text-white mb-3"></i>
                        <h3>Restablecer Clave</h3>
                        <p class="text-white-50 m-0">Enviaremos un enlace de recuperación a tu correo electrónico.</p>
                    </div>

                    <div class="card-body p-4 p-md-5">

                        <form id="django-form" method="POST">
                            {% csrf_token %}

                            {{ form.as_p }}

                            {% if form.errors %}
                                <div class="error-box active mb-3">
                                    {% for field in form %}
                                        {% for error in field.errors %}
                                            <div class="error-item">
                                                <i class="fas fa-exclamation-circle me-2"></i> {{ error }}
                                            </div>
                                        {% endfor %}
                                    {% endfor %}
                                </div>
                            {% endif %}

                            <div class="d-grid mt-4">
                                <button type="submit" class="btn-save btn-lg">
                                    Enviar Correo <i class="fas fa-paper-plane ms-2"></i>
                                </button>
                            </div>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
