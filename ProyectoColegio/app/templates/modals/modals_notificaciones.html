<!-- MODAL NOTIFICACIONES -->

  <div class="modal-dialog modal-xl modal-dialog-centered modal-san-nicolas">
    <div class="modal-content shadow-lg border-0 rounded-4">

      <!-- HEADER -->
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title">
          <i class="fa-solid fa-bell me-2"></i> Notificaciones
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <!-- BODY -->
      <div class="modal-body p-4" style="max-height: 500px; overflow-y: auto;">

        {% if notificaciones %}
          {% for noti in notificaciones %}
          <div class="card mb-3 shadow-sm border-0 notification-item">
            <div class="card-body d-flex justify-content-between align-items-start">

              <div>
                <h6 class="fw-bold mb-1 text-primary">
                  {{ noti.titulo }}
                </h6>
                <p class="mb-1 text-muted">
                  {{ noti.mensaje }}
                </p>
                <small class="text-secondary">
                  <i class="fa-regular fa-clock"></i> {{ noti.fecha_envio }}
                </small>
              </div>

              <span class="badge {% if noti.estado == 'Activo' %}bg-success{% else %}bg-secondary{% endif %}">
                {% if noti.estado == 'Activo' %}Nuevo{% else %}Leído{% endif %}
              </span>

            </div>
          </div>
          {% endfor %}
        {% else %}
          <div class="text-center text-muted py-4">
            <i class="fa-solid fa-bell-slash fa-2x mb-2"></i>
            <p class="mb-0">No tienes notificaciones por el momento.</p>
          </div>
        {% endif %}

      </div>

      <!-- FOOTER -->
      <div class="modal-footer">
        <button class="btn btn-secondary" id="btnCerrarNoti2">
          Cerrar
        </button>
      </div>

    </div>
  </div>
