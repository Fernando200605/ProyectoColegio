<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="margin:0; padding:0; background-color:#f4f4f4; font-family:Arial, sans-serif;">

    <div style="max-width:600px; margin:30px auto; background:#ffffff; border-radius:10px; padding:20px; box-shadow:0 0 10px rgba(0,0,0,0.1);">

        <div style="text-align: center; margin-bottom: 20px;">
           <img src="cid:logo_colegio" alt="Logo del colegio">
            
            <p style="color:#1c2e4a; font-size: 14px; font-style: italic; margin: 10px 0 0 0;">
                Formando Líderes que dejan Huella
            </p>
        </div>

        <!-- Saludo -->
        <p style="font-size:16px;">
            Hola <strong>{{ nombre }}</strong>,
        </p>

        <!-- Mensaje -->
        <p style="font-size:15px; color:#555;">
            {{ mensaje }}
        </p>

        <!-- Botón -->
        <div style="text-align:center; margin:30px 0;">
            <a href="{{ enlace }}" 
               style="background:#4CAF50; color:#fff; padding:12px 20px; text-decoration:none; border-radius:5px; font-weight:bold;">
               Ir al sistema
            </a>
        </div>

        <!-- Footer -->
        <hr>
        <p style="font-size:12px; color:#999; text-align:center;">
            Este es un mensaje automático, por favor no responder.
        </p>

    </div>

</body>
</html>
