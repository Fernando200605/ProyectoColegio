{% extends 'home.html' %}
{% load static %}
{% block body %}
  <body class="layout-blur">
    <!-- Botón hamburguesa (fuera de la sidebar para que siempre sea visible) -->
    <button class="hamburger" id="hamburger"><i class="fa-solid fa-bars"></i></button>

    <!-- Sidebar -->
    {% include 'sidebar.html' %}

    <div class="main-content">
      {% include 'header.html' %}
      {% block main %}
        {% include 'main.html' %}
      {% endblock %}
      <!-- Botón flotante -->
      <div class="btn-chat" id="btnChat"><i class="fa-solid fa-comment"></i></div>

      <!-- Chat -->
      <div class="chat-container" id="chatContainer">
        <div class="chat-header">🤖 Chatbot
          <span id="cerrarChat" class="cerrar">✖</span>
        </div>

        <div class="chat-box" id="chatBox"></div>

        <div class="chat-input">
          <input type="text" id="inputMensaje" placeholder="Escribe un mensaje..." />
          <button id="btnEnviar">Enviar</button>
        </div>
      </div>
      <div class="modal fade" id="modalGeneral" tabindex="-1" aria-hidden="true">
        <div id="contenedorModal"></div>
      </div>
      <div id="contenedorMensajes" class="position-fixed top-0 end-0 p-3" style="z-index: 9999;"></div>
    </div>
    <script src="{% static 'Js/modal.js' %}"></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- DataTables -->
    <link rel="stylesheet" href="{% static 'css/jquery.dataTables.min.css' %}" />
    <link rel="stylesheet" href="{% static "css/responsive.dataTables.min.css" %}"/>
    <script src="{% static 'Js/jquery.dataTables.min.js' %}"></script>
    <script src="{% static "Js/dataTables.responsive.min.js" %}"></script>
    <!-- Bootstrap -->
    <script src="{% static 'lib/bootstrap-4.4.1-dist/js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'lib/bootstrap-4.4.1-dist/js/bootstrap.min.js' %}"></script>

    <!-- AdminLTE -->
    <script src="{% static 'lib/adminlte-3.0.4/js/adminlte.min.js' %}"></script>

    <!-- SweetAlert -->
    <script src="{% static 'lib/sweetalert2/sweetalert2.all.min.js' %}"></script>
    <!-- Qr code -->

    <script>
      const hamburger = document.getElementById('hamburger');
      const sidebar = document.getElementById('sidebar');
      const sidebarToggle = document.getElementById('sidebarToggle');
      const sidebarClose = document.getElementById('sidebarClose');
      const sidebarOverlay = document.getElementById('sidebarOverlay');
      
      // Toggle sidebar on hamburger click
      if (hamburger) {
        hamburger.addEventListener('click', () => {
          sidebar.classList.toggle('open');
          hamburger.classList.toggle('active');
        });
      }

      // Toggle sidebar on mobile toggle button click
      if (sidebarToggle) {
        sidebarToggle.addEventListener('click', () => {
          sidebar.classList.add('active');
          if (sidebarOverlay) sidebarOverlay.classList.add('active');
        });
      }

      // Close sidebar when close button is clicked
      if (sidebarClose) {
        sidebarClose.addEventListener('click', () => {
          sidebar.classList.remove('active');
          if (sidebarOverlay) sidebarOverlay.classList.remove('active');
        });
      }

      // Close sidebar when overlay is clicked
      if (sidebarOverlay) {
        sidebarOverlay.addEventListener('click', () => {
          sidebar.classList.remove('active');
          sidebarOverlay.classList.remove('active');
        });
      }

      // Close sidebar on escape key
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && sidebar && sidebar.classList.contains('active')) {
          sidebar.classList.remove('active');
          if (sidebarOverlay) sidebarOverlay.classList.remove('active');
        }
      });
    </script>
    {% if messages %}
      <script>
        document.addEventListener('DOMContentLoaded', function () {
          {% for message in messages %}
          {% if 'login' in message.tags %}
            Swal.fire({
              toast: true,
              position: "top-end",
              title: "{{ message }}",
              icon: "success",
              showConfirmButton: false,
              timer: 2000,
              timerProgressBar: true
            });
          {% else %}
            Swal.fire({
              title: "{{ message }}",
              icon: "{{ message.tags }}",
              showConfirmButton: false,
              timer: 2000,
              timerProgressBar: true
            });
            {% endif %}
          {% endfor %}
        });
      </script>
    {% endif %}

    {% include 'footer.html' %}
    {% block js %}

    {% endblock %}
  </body>
{% endblock %}
