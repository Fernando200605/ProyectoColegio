services:
  db:
      image: mysql:8.0
      restart: always
      environment:
        MYSQL_DATABASE: colegio_db
        MYSQL_ROOT_PASSWORD: '1055962626'  
      ports:
        - "3307:3306" 
      volumes:
        - mysql_data:/var/lib/mysql

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: "1"
    depends_on:
      - db 

volumes:
  mysql_data: 