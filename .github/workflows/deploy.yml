name: Integración Continua

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  test:

    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: colegio_db
          MYSQL_ROOT_PASSWORD: 1055962626
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -p1055962626"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}

      MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
      MYSQL_USER: root
      MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306

      EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
      EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
      KEY_PASSWORD_IA: ${{ secrets.KEY_PASSWORD_IA }}

    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc \
            pkg-config \
            python3-dev \
            default-libmysqlclient-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libharfbuzz-dev \
            libharfbuzz-subset0 \
            libgdk-pixbuf-2.0-dev \
            libffi-dev \
            shared-mime-info

      - name: Instalar dependencias de Python
        run: |
          python -m pip install --upgrade pip
          pip install -r ProyectoColegio/requirements.txt

      - name: Esperar a MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 -uroot -p${{ secrets.MYSQL_ROOT_PASSWORD }} --silent; do
            echo "Esperando MySQL..."
            sleep 2
          done

      - name: Ejecutar migraciones
        working-directory: ProyectoColegio
        run: python manage.py migrate

      - name: Ejecutar pruebas
        working-directory: ProyectoColegio
        run: python manage.py test